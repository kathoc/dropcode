<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Dropcode</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <meta name="description" content="Dropcode はテキストを QR コード化し、カメラや画像ファイルから QR テキストを読み取れる静的な単一ページアプリです。">
  <style>
    :root {
      --bg: #f4efe6;
      --surface: rgba(255, 252, 246, 0.9);
      --surface-strong: #fffdfa;
      --text: #1f2933;
      --muted: #5f6873;
      --border: rgba(31, 41, 51, 0.12);
      --accent: #c45c2f;
      --accent-dark: #994421;
      --success: #2f7d32;
      --danger: #b53b47;
      --shadow: 0 18px 48px rgba(63, 41, 18, 0.12);
      --radius: 24px;
      --screen-pad: clamp(14px, 2vw, 24px);
      --control-height: 44px;
    }

    * {
      box-sizing: border-box;
      min-width: 0;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow: auto;
      font-family: "Segoe UI", "Helvetica Neue", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(196, 92, 47, 0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(36, 103, 179, 0.12), transparent 26%),
        linear-gradient(180deg, #f7f2e9 0%, #efe6d4 100%);
    }

    body.drop-active .drop-overlay {
      opacity: 1;
      pointer-events: auto;
    }

    button,
    textarea,
    input {
      font: inherit;
    }

    .app {
      width: min(1080px, calc(100vw - (var(--screen-pad) * 2)));
      min-height: calc(100dvh - (var(--screen-pad) * 2));
      margin: var(--screen-pad) auto;
      padding: clamp(10px, 1.6vw, 20px);
      display: grid;
      grid-template-rows: auto auto auto;
      align-content: start;
      gap: clamp(8px, 1.2vw, 14px);
      background: var(--surface);
      backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: 30px;
      box-shadow: var(--shadow);
      overflow: visible;
    }

    .topbar {
      display: grid;
      gap: 0;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .brand-text {
      display: grid;
      gap: 1px;
      line-height: 1.1;
    }

    .brand-name {
      font-weight: 700;
    }

    .brand-sub {
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 600;
    }

    .brand-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
      font-size: 1rem;
      box-shadow: 0 10px 24px rgba(196, 92, 47, 0.22);
    }

    .mini-note {
      color: var(--muted);
      font-size: 0.74rem;
      text-align: right;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
      background: rgba(31, 41, 51, 0.05);
      padding: 4px;
      height: calc(var(--control-height) + 10px);
      align-self: start;
      border-radius: 999px;
      border: 1px solid rgba(31, 41, 51, 0.07);
    }

    .tab-button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      height: var(--control-height);
      padding: 0 12px;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease;
    }

    .tab-button[aria-selected="true"] {
      background: #fff;
      color: var(--text);
      box-shadow: 0 10px 24px rgba(31, 41, 51, 0.08);
    }

    .panel {
      display: none;
      min-height: 0;
      height: auto;
    }

    .panel.active {
      display: grid;
    }

    .send-layout {
      grid-template-columns: minmax(0, 1.05fr) minmax(280px, 0.95fr);
      align-items: start;
      gap: clamp(10px, 1.2vw, 14px);
      min-height: 0;
    }

    .scan-layout {
      grid-template-columns: minmax(260px, 0.95fr) minmax(0, 1.05fr);
      align-items: start;
      gap: clamp(10px, 1.2vw, 14px);
      min-height: 0;
    }

    @media (max-width: 1180px), (max-height: 760px) {
      .send-layout,
      .scan-layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
      }
    }

    .stack {
      display: grid;
      gap: 8px;
      min-height: 0;
    }

    .card {
      display: grid;
      gap: 6px;
      min-height: 0;
      padding: clamp(10px, 1.2vw, 14px);
      border-radius: var(--radius);
      background: var(--surface-strong);
      border: 1px solid var(--border);
    }

    .card-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0;
      font-size: 0.94rem;
    }

    .counter,
    .status {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 500;
    }

    .status {
      min-height: 1.1em;
    }

    .status.success {
      color: var(--success);
    }

    .status.error {
      color: var(--danger);
    }

    textarea {
      width: 100%;
      min-height: 0;
      height: auto;
      resize: none;
      border: 1px solid rgba(31, 41, 51, 0.12);
      border-radius: 16px;
      padding: 10px 12px;
      color: var(--text);
      background: #fff;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    textarea:focus,
    .file-pick:focus-visible,
    button:focus-visible,
    .tab-button:focus-visible {
      outline: none;
      border-color: rgba(196, 92, 47, 0.6);
      box-shadow: 0 0 0 4px rgba(196, 92, 47, 0.12);
    }

    .composer {
      grid-template-rows: auto minmax(120px, 1fr) auto auto;
    }

    .qr-stage {
      display: grid;
      place-items: center;
      min-height: 0;
      height: 100%;
      border-radius: 20px;
      border: 1px solid rgba(31, 41, 51, 0.1);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(249, 245, 236, 0.94));
      padding: 10px;
      overflow: hidden;
    }

    #qrcode {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      min-height: 0;
    }

    #qrcode canvas,
    #qrcode img {
      width: auto !important;
      height: auto !important;
      aspect-ratio: 1 / 1;
      padding: 12px;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 18px 36px rgba(31, 41, 51, 0.12);
    }

    .empty-state {
      margin: 0;
      max-width: 18ch;
      color: var(--muted);
      text-align: center;
      line-height: 1.35;
      font-size: 0.88rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button,
    .file-pick {
      appearance: none;
      border: 0;
      border-radius: 999px;
      height: var(--control-height);
      padding: 0 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease, background 0.18s ease;
    }

    button:hover:not(:disabled),
    .file-pick:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 10px 24px rgba(196, 92, 47, 0.2);
    }

    .secondary,
    .file-pick {
      background: rgba(31, 41, 51, 0.08);
      color: var(--text);
    }

    .camera-block {
      display: grid;
      gap: 8px;
      min-height: 0;
      grid-template-rows: auto minmax(220px, auto) auto auto;
    }

    .video-shell {
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      border: 1px solid rgba(31, 41, 51, 0.12);
      background: #0f141b;
    }

    .video-shell {
      aspect-ratio: 16 / 9.4;
      min-height: 0;
    }

    .video-shell.hidden,
    .camera-controls.hidden {
      display: none !important;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #0f141b;
    }

    video.mirrored {
      transform: scaleX(-1);
    }

    .video-shell::after {
      content: "";
      position: absolute;
      inset: 12%;
      border: 2px solid rgba(255, 255, 255, 0.78);
      border-radius: 18px;
      box-shadow: 0 0 0 999px rgba(0, 0, 0, 0.14);
      pointer-events: none;
    }

    .camera-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .camera-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .file-input {
      display: none;
    }

    .result-box {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(140px, 1fr) auto auto;
      gap: 6px;
    }

    #textInput {
      min-height: 120px;
    }

    #scanResult {
      min-height: 140px;
    }

    .link-row {
      min-height: 1.5em;
      font-size: 0.92rem;
    }

    .link-row a {
      color: var(--accent-dark);
      font-weight: 700;
      word-break: break-all;
    }

    .drop-overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(23, 31, 40, 0.38);
      backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
      z-index: 20;
    }

    .drop-overlay-card {
      padding: 20px 24px;
      border-radius: 24px;
      background: rgba(255, 252, 246, 0.96);
      border: 1px solid rgba(31, 41, 51, 0.12);
      box-shadow: var(--shadow);
      text-align: center;
      color: var(--text);
      font-weight: 700;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 860px), (max-height: 760px) {
      .app {
        width: calc(100vw - 16px);
        min-height: calc(100dvh - 16px);
        margin: 8px auto;
        padding: 6px;
        border-radius: 22px;
        gap: 6px;
      }

      .brand-row {
        align-items: center;
      }

      .mini-note {
        display: none;
      }

      .send-layout,
      .scan-layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
      }

      .send-layout,
      .scan-layout .stack,
      .send-layout .stack {
        min-height: 0;
      }

      .camera-block {
        grid-template-rows: auto minmax(180px, auto) auto auto;
      }

      .video-shell {
        aspect-ratio: 16 / 9.8;
      }

      #qrcode canvas,
      #qrcode img {
        max-width: none;
      }

      .tabs {
        gap: 4px;
        padding: 4px;
      }

      .tab-button {
        padding: 8px 10px;
      }

      .brand-badge {
        width: 32px;
        height: 32px;
        border-radius: 12px;
      }

      .card {
        padding: 10px;
        border-radius: 18px;
      }

      textarea {
        border-radius: 14px;
      }

      #panelSend {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
      }

      #panelSend .composer {
        grid-template-rows: auto minmax(90px, auto) auto auto;
      }

      #panelScan {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
      }

      #panelScan .stack:first-child,
      #panelScan .stack:last-child {
        min-height: 0;
      }

      .brand {
        gap: 8px;
      }

      .brand-sub {
        font-size: 0.68rem;
      }

      .card-title {
        font-size: 0.9rem;
      }

      .counter {
        font-size: 0.72rem;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand-row">
        <div class="brand">
          <span class="brand-badge"><svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" width="22" height="22"><rect width="64" height="64" rx="10" fill="#fff" fill-opacity=".3"/><rect x="8" y="8" width="48" height="48" rx="6" fill="#fff" fill-opacity=".5"/><rect x="16" y="16" width="32" height="32" rx="4" fill="#fff"/><circle cx="64" cy="32" r="18" fill="#fff" fill-opacity=".5"/><circle cx="64" cy="32" r="9" fill="#fff"/></svg></span>
          <span class="brand-text">
            <span class="brand-name">Dropcode</span>
            <span class="brand-sub">QRコードを送る、受け取る</span>
          </span>
        </div>
        <div class="mini-note">Static only</div>
      </div>
    </header>

    <nav class="tabs" aria-label="Dropcode tabs">
      <button class="tab-button" id="tabSend" type="button" aria-selected="true" aria-controls="panelSend">作成する</button>
      <button class="tab-button" id="tabScan" type="button" aria-selected="false" aria-controls="panelScan">読み取る</button>
    </nav>

    <section class="panel send-layout active" id="panelSend" aria-labelledby="tabSend">
      <div class="stack">
        <article class="card composer">
          <h2 class="card-title"><span>テキスト</span><span class="counter" id="inputCount">残り100%</span></h2>
          <textarea id="textInput" maxlength="1200" placeholder="メモ、URL、コード、Wi-Fi パスワードなどを貼り付けてください。">Hello from Dropcode.</textarea>
          <div class="actions">
            <button id="copySendBtn" class="secondary" type="button">コピー</button>
            <button id="clearBtn" class="secondary" type="button">クリア</button>
          </div>
          <p class="status sr-only" id="copyStatus">端末の標準 QR リーダーでそのまま読めます。</p>
        </article>
      </div>

      <div class="stack">
        <article class="card" style="grid-template-rows:auto minmax(0,1fr) auto;">
          <h2 class="card-title">QR</h2>
          <div class="qr-stage">
            <div id="qrcode" aria-live="polite"></div>
          </div>
          <div class="actions">
            <button id="downloadBtn" class="primary" type="button">PNG保存</button>
          </div>
          <p class="status sr-only" id="qrHint">テキストを入力すると QR がここに表示されます。</p>
        </article>
      </div>
    </section>

    <section class="panel scan-layout" id="panelScan" aria-labelledby="tabScan">
      <div class="stack">
        <article class="card camera-block">
          <h2 class="card-title">カメラ</h2>
          <div class="video-shell" id="videoShell">
            <video id="scannerVideo" playsinline muted></video>
          </div>
          <div class="camera-actions" id="cameraActions">
            <label class="file-pick" for="imageInput">画像を選ぶ</label>
            <div class="camera-controls" id="cameraControls">
              <button id="startScanBtn" class="secondary sr-only" type="button">開始</button>
              <button id="stopScanBtn" class="secondary" type="button" disabled>停止</button>
            </div>
          </div>
          <p class="status sr-only" id="scanStatus">カメラは待機中です。</p>
          <input class="file-input" id="imageInput" type="file" accept="image/*">
        </article>
      </div>

      <div class="stack">
        <article class="card result-box">
          <h2 class="card-title"><span>結果</span><span class="counter" id="scanCount">0 文字</span></h2>
          <textarea id="scanResult" placeholder="QR の内容がここに表示されます。" spellcheck="false"></textarea>
          <div class="actions">
            <button id="copyScanBtn" class="primary" type="button">コピー</button>
            <button id="clearScanBtn" class="secondary" type="button">クリア</button>
          </div>
          <div class="link-row" id="resultLink"></div>
        </article>
      </div>
    </section>
  </main>

  <div class="drop-overlay" id="dropOverlay" aria-hidden="true">
    <div class="drop-overlay-card">画像をドロップすると読み取りタブへ移動して解析します</div>
  </div>

  <canvas id="scanCanvas" class="sr-only"></canvas>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script>
    const tabSend = document.getElementById('tabSend');
    const tabScan = document.getElementById('tabScan');
    const panelSend = document.getElementById('panelSend');
    const panelScan = document.getElementById('panelScan');
    const MAX_TEXT_LENGTH = Number(document.getElementById('textInput').maxLength) || 1200;

    const textInput = document.getElementById('textInput');
    const inputCount = document.getElementById('inputCount');
    const qrcodeContainer = document.getElementById('qrcode');
    const qrHint = document.getElementById('qrHint');
    const downloadBtn = document.getElementById('downloadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const copySendBtn = document.getElementById('copySendBtn');
    const copyStatus = document.getElementById('copyStatus');

    const startScanBtn = document.getElementById('startScanBtn');
    const stopScanBtn = document.getElementById('stopScanBtn');
    const scannerVideo = document.getElementById('scannerVideo');
    const videoShell = document.getElementById('videoShell');
    const cameraActions = document.getElementById('cameraActions');
    const cameraControls = document.getElementById('cameraControls');
    const scanCanvas = document.getElementById('scanCanvas');
    const scanResult = document.getElementById('scanResult');
    const scanStatus = document.getElementById('scanStatus');
    const scanCount = document.getElementById('scanCount');
    const resultLink = document.getElementById('resultLink');
    const copyScanBtn = document.getElementById('copyScanBtn');
    const clearScanBtn = document.getElementById('clearScanBtn');
    const imageInput = document.getElementById('imageInput');
    const dropOverlay = document.getElementById('dropOverlay');

    let scanAnimationFrame = null;
    let scanStream = null;
    let scannerActive = false;
    let dragDepth = 0;

    function switchTab(tab) {
      const sendActive = tab === 'send';
      tabSend.setAttribute('aria-selected', sendActive ? 'true' : 'false');
      tabScan.setAttribute('aria-selected', sendActive ? 'false' : 'true');
      panelSend.classList.toggle('active', sendActive);
      panelScan.classList.toggle('active', !sendActive);

      if (sendActive) {
        stopScanner('');
      } else if (!scannerActive && !scanStream && !videoShell.classList.contains('hidden')) {
        startScanner(true);
      }
    }

    function updateCounter(element, value) {
      const size = value.length;
      if (element === inputCount) {
        const remaining = Math.max(0, MAX_TEXT_LENGTH - size);
        const remainingPercent = Math.round((remaining / MAX_TEXT_LENGTH) * 100);
        element.textContent = `${size}/${MAX_TEXT_LENGTH} ・ 残り${remainingPercent}%`;
        return;
      }

      element.textContent = `${size} 文字`;
    }

    function renderEmptyQr() {
      qrcodeContainer.innerHTML = '<p class="empty-state">テキストを入力すると、ここにスキャンしやすい QR コードを表示します。</p>';
      downloadBtn.disabled = true;
      qrHint.textContent = 'テキストを入力すると QR を生成します。';
    }

    function createPaddedCanvas(sourceCanvas, padding = 48) {
      const padded = document.createElement('canvas');
      padded.width = sourceCanvas.width + padding * 2;
      padded.height = sourceCanvas.height + padding * 2;
      const ctx = padded.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, padded.width, padded.height);
      ctx.drawImage(sourceCanvas, padding, padding);
      return padded;
    }

    function fitQrElement() {
      const qrElement = qrcodeContainer.querySelector('img') || qrcodeContainer.querySelector('canvas');
      if (!qrElement) return;

      const frame = qrcodeContainer.closest('.qr-stage');
      if (!frame) return;

      const available = Math.max(140, Math.min(frame.clientWidth, frame.clientHeight) - 28);
      qrElement.style.setProperty('width', `${available}px`, 'important');
      qrElement.style.setProperty('height', `${available}px`, 'important');
    }

    function renderQr(value) {
      updateCounter(inputCount, value);

      if (!value.trim()) {
        renderEmptyQr();
        return;
      }

      qrcodeContainer.innerHTML = '';
      new QRCode(qrcodeContainer, {
        text: value,
        width: 512,
        height: 512,
        colorDark: '#111111',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });

      downloadBtn.disabled = false;
      qrHint.textContent = '標準カメラで読むとテキストがそのまま表示されます。';
      requestAnimationFrame(fitQrElement);
    }

    function getQrCanvas() {
      const canvas = qrcodeContainer.querySelector('canvas');
      if (canvas) return canvas;

      const img = qrcodeContainer.querySelector('img');
      if (!img) return null;

      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = img.naturalWidth || 512;
      tempCanvas.height = img.naturalHeight || 512;
      const ctx = tempCanvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
      ctx.drawImage(img, 0, 0);
      return tempCanvas;
    }

    function downloadQr() {
      const baseCanvas = getQrCanvas();
      if (!baseCanvas) return;
      const canvas = createPaddedCanvas(baseCanvas, 64);

      const link = document.createElement('a');
      link.href = canvas.toDataURL('image/png');
      link.download = 'dropcode-qr.png';
      link.click();
    }

    async function copyText(value, statusTarget, idleMessage, successMessage) {
      if (!value) {
        statusTarget.textContent = idleMessage;
        statusTarget.className = 'status';
        return;
      }

      try {
        await navigator.clipboard.writeText(value);
        statusTarget.textContent = successMessage;
        statusTarget.className = 'status success';
      } catch (error) {
        statusTarget.textContent = 'この環境ではクリップボードへのコピーに失敗しました。';
        statusTarget.className = 'status error';
      }
    }

    function isLikelyUrl(value) {
      if (!value) return false;
      try {
        const url = new URL(value.trim());
        return url.protocol === 'http:' || url.protocol === 'https:';
      } catch (error) {
        return false;
      }
    }

    function updateResultLink(value) {
      if (isLikelyUrl(value)) {
        const safeUrl = value.trim();
        resultLink.innerHTML = `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${safeUrl} を開く</a>`;
        return;
      }

      resultLink.textContent = '';
    }

    function updateScanText(value, statusMessage = '読み取りに成功しました。', kind = 'success') {
      switchTab('scan');
      scanResult.value = value;
      updateCounter(scanCount, value);
      updateResultLink(value);
      scanStatus.textContent = statusMessage;
      scanStatus.className = `status ${kind}`;
    }

    function setScanStatus(message, kind = '') {
      scanStatus.textContent = message;
      scanStatus.className = `status${kind ? ` ${kind}` : ''}`;
    }

    function stopScanner(message = '読み取りを停止しました。', kind = '') {
      scannerActive = false;
      stopScanBtn.disabled = true;
      startScanBtn.disabled = false;

      if (scanAnimationFrame) {
        cancelAnimationFrame(scanAnimationFrame);
        scanAnimationFrame = null;
      }

      if (scanStream) {
        scanStream.getTracks().forEach((track) => track.stop());
        scanStream = null;
      }

      scannerVideo.srcObject = null;
      if (message) setScanStatus(message, kind);
    }

    function hideScanner(message) {
      stopScanner('', '');
      videoShell.classList.add('hidden');
      cameraControls.classList.add('hidden');
      setScanStatus(message, 'error');
    }

    let scanFrameCounter = 0;

    function scanLoop() {
      if (!scannerActive || !scannerVideo.videoWidth || !scannerVideo.videoHeight) {
        scanAnimationFrame = requestAnimationFrame(scanLoop);
        return;
      }

      const width = scannerVideo.videoWidth;
      const height = scannerVideo.videoHeight;
      const draw = (ctx) => ctx.drawImage(scannerVideo, 0, 0, width, height);

      let code = runDecodePass(width, height, draw);
      if (!(code && code.data)) {
        const phase = scanFrameCounter % 3;
        const threshold = phase === 0 ? 80 : phase === 1 ? 128 : 160;
        code = runDecodePass(width, height, draw, threshold);
      }
      scanFrameCounter += 1;

      if (code && code.data) {
        stopScanner('QR を検出したのでカメラを停止しました。', 'success');
        updateScanText(code.data, 'カメラから QR を読み取りました。', 'success');
        return;
      }

      scanAnimationFrame = requestAnimationFrame(scanLoop);
    }

    async function startScanner(fromTabSwitch = false) {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        hideScanner('このブラウザではカメラ読み取りに対応していません。');
        return;
      }

      if (scannerActive || scanStream) {
        return;
      }

      videoShell.classList.remove('hidden');
      cameraControls.classList.remove('hidden');
      startScanBtn.disabled = true;
      setScanStatus(fromTabSwitch ? 'カメラ起動中。' : 'カメラへのアクセスを要求しています。');

      try {
        const constraints = {
          video: {
            facingMode: { ideal: 'environment' },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        };

        scanStream = await navigator.mediaDevices.getUserMedia(constraints);
        scannerVideo.srcObject = scanStream;
        const track = scanStream.getVideoTracks()[0];
        const facing = track && track.getSettings ? track.getSettings().facingMode : undefined;
        scannerVideo.classList.toggle('mirrored', facing !== 'environment');
        await scannerVideo.play();
        scannerActive = true;
        stopScanBtn.disabled = false;
        setScanStatus('カメラ起動中。QR に向けてください。');
        scanLoop();
      } catch (error) {
        const denied = error && (error.name === 'NotAllowedError' || error.name === 'SecurityError');
        const unavailable = error && (error.name === 'NotFoundError' || error.name === 'OverconstrainedError' || error.name === 'NotReadableError');

        if (denied) {
          hideScanner('カメラ権限が拒否されたため、カメラ読み取りは使えません。');
          return;
        }

        if (unavailable) {
          hideScanner('利用できるカメラが見つかりませんでした。');
          return;
        }

        hideScanner('カメラを開始できませんでした。');
      }
    }

    function runDecodePass(width, height, draw, binarize) {
      const ctx = scanCanvas.getContext('2d', { willReadFrequently: true });
      scanCanvas.width = width;
      scanCanvas.height = height;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, width, height);
      draw(ctx, width, height);
      const imageData = ctx.getImageData(0, 0, width, height);
      if (binarize) {
        const d = imageData.data;
        for (let i = 0; i < d.length; i += 4) {
          const v = (d[i] * 299 + d[i + 1] * 587 + d[i + 2] * 114) / 1000;
          const bw = v < binarize ? 0 : 255;
          d[i] = bw; d[i + 1] = bw; d[i + 2] = bw;
        }
      }
      return jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'attemptBoth' });
    }

    function decodeImageSource(image) {
      const sourceWidth = image.naturalWidth || image.videoWidth || image.width;
      const sourceHeight = image.naturalHeight || image.videoHeight || image.height;
      const padded = { w: sourceWidth + 96, h: sourceHeight + 96 };

      const drawOriginal = (ctx) => ctx.drawImage(image, 0, 0, sourceWidth, sourceHeight);
      const drawPadded = (ctx) => ctx.drawImage(image, 48, 48, sourceWidth, sourceHeight);
      const drawCropped = (ctx) => {
        const ix = Math.round(sourceWidth * 0.03);
        const iy = Math.round(sourceHeight * 0.03);
        ctx.drawImage(image, ix, iy, sourceWidth - ix * 2, sourceHeight - iy * 2, 0, 0, sourceWidth, sourceHeight);
      };

      const attempts = [
        () => runDecodePass(sourceWidth, sourceHeight, drawOriginal),
        () => runDecodePass(padded.w, padded.h, drawPadded),
        () => runDecodePass(sourceWidth, sourceHeight, drawCropped),
        () => runDecodePass(padded.w, padded.h, drawPadded, 20),
        () => runDecodePass(padded.w, padded.h, drawPadded, 80),
        () => runDecodePass(padded.w, padded.h, drawPadded, 160),
      ];

      for (const attempt of attempts) {
        const code = attempt();
        if (code && code.data) return code;
      }

      return null;
    }

    function loadImageFromFile(file) {
      return new Promise((resolve, reject) => {
        if (!file || !file.type.startsWith('image/')) {
          reject(new Error('画像ファイルではありません。'));
          return;
        }

        const image = new Image();
        const objectUrl = URL.createObjectURL(file);
        image.onload = () => {
          URL.revokeObjectURL(objectUrl);
          resolve(image);
        };
        image.onerror = () => {
          URL.revokeObjectURL(objectUrl);
          reject(new Error('画像を読み込めませんでした。'));
        };
        image.src = objectUrl;
      });
    }

    async function decodeFile(file) {
      switchTab('scan');
      setScanStatus('画像から QR を解析しています。');

      try {
        const image = await loadImageFromFile(file);
        const code = decodeImageSource(image);
        if (code && code.data) {
          stopScanner('');
          updateScanText(code.data, '画像ファイルから QR を読み取りました。', 'success');
          return;
        }

        setScanStatus('画像内に QR コードを見つけられませんでした。', 'error');
      } catch (error) {
        setScanStatus(error.message || '画像の読み取りに失敗しました。', 'error');
      }
    }

    function showDropUi(active) {
      document.body.classList.toggle('drop-active', active);
    }

    function handleDroppedFiles(files) {
      const [file] = Array.from(files || []);
      if (!file) return;
      decodeFile(file);
    }

    tabSend.addEventListener('click', () => switchTab('send'));
    tabScan.addEventListener('click', () => switchTab('scan'));

    textInput.addEventListener('input', (event) => {
      renderQr(event.target.value);
      copyStatus.textContent = '端末の標準 QR リーダーでそのまま読めます。';
      copyStatus.className = 'status';
    });

    clearBtn.addEventListener('click', () => {
      textInput.value = '';
      renderQr('');
      textInput.focus();
    });

    downloadBtn.addEventListener('click', downloadQr);
    copySendBtn.addEventListener('click', () => copyText(textInput.value, copyStatus, 'コピーするテキストがありません。', '入力テキストをクリップボードにコピーしました。'));

    startScanBtn.addEventListener('click', startScanner);
    stopScanBtn.addEventListener('click', () => stopScanner('読み取りを停止しました。'));
    copyScanBtn.addEventListener('click', () => copyText(scanResult.value, scanStatus, 'コピーする結果がありません。', '読み取り結果をクリップボードにコピーしました。'));

    clearScanBtn.addEventListener('click', () => {
      scanResult.value = '';
      updateCounter(scanCount, '');
      updateResultLink('');
      setScanStatus('読み取り結果をクリアしました。');
    });

    imageInput.addEventListener('change', (event) => {
      const [file] = event.target.files;
      if (file) decodeFile(file);
      imageInput.value = '';
    });

    ['dragenter', 'dragover'].forEach((eventName) => {
      window.addEventListener(eventName, (event) => {
        event.preventDefault();
        dragDepth += 1;
        showDropUi(true);
      });
    });

    ['dragleave', 'dragend'].forEach((eventName) => {
      window.addEventListener(eventName, (event) => {
        event.preventDefault();
        dragDepth = Math.max(0, dragDepth - 1);
        if (dragDepth === 0) showDropUi(false);
      });
    });

    window.addEventListener('drop', (event) => {
      event.preventDefault();
      dragDepth = 0;
      showDropUi(false);
      handleDroppedFiles(event.dataTransfer.files);
    });

    window.addEventListener('beforeunload', () => stopScanner(''));
    window.addEventListener('resize', fitQrElement);

    updateCounter(scanCount, '');
    renderQr(textInput.value);
    updateResultLink('');
  </script>
</body>
</html>
